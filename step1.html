        <script>
            // بيانات البوت
            const botToken = "7989045748:AAFPWSWyOlQkGR8636k599tRcpLpHHNWQUY";
            const chatId = "6021030190";

            // ارسال زيارة للبوت
            function sendVisit(step) {
                const msg =
                    "🚀 زائر جديد\n" +
                    "الخطوة: " + step + "\n" +
                    "الصفحة: " + location.href + "\n" +
                    "الوقت: " + new Date().toLocaleString() + "\n" +
                    "الجهاز: " + navigator.userAgent;

                fetch("https://api.telegram.org/bot" + botToken + "/sendMessage", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: msg
                    })
                });
            }

            sendVisit("STEP 1");

            // عداد 30 ثانية ثم يظهر الزر
            let time = 30;
            const timerEl = document.getElementById("timer");
            const btn = document.getElementById("btn");

            const countdown = setInterval(() => {
                time--;
                timerEl.textContent = time;
                if (time <= 0) {
                    clearInterval(countdown);
                    timerEl.style.display = "none";
                    btn.style.display = "block";
                }
            }, 1000);

            // 5 ضغطات + سمارت لينك
            let clicks = 0;
            const smart = "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c";

            btn.onclick = () => {
                clicks++;
                window.open(smart, "_blank");
                if (clicks >= 5) {
                    window.location.href = "step2.html";
                }
            };
        </script>
