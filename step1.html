    circle1.style.background=`conic-gradient(red ${deg}deg,#ddd ${deg}deg 360deg)`;
    time1--;
    if(time1<0){
        clearInterval(interval1);
        circle1.style.display="none";
        document.getElementById("btn1").style.display="block";
    }
},1000);

let clicks1=0;
