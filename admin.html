<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Admin</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">SM - لوحة الأدمن</div>

<div class="container">
    <h2>اختصار رابط جديد</h2>
    <input type="text" id="url" placeholder="https://example.com">
    <button onclick="generate()">إنشاء الرابط</button>
    <div id="result" class="notice"></div>
</div>

<script>
function encodeUTF8(str){
    return btoa(unescape(encodeURIComponent(str)));
}

function generate(){
    const url = document.getElementById("url").value.trim();

    if(!url || !url.startsWith("http")){
        alert("اكتب رابط صحيح يبدأ بـ https://");
        return;
    }

    const encoded = encodeUTF8(url);

    // إصلاح مشكلة GitHub Pages داخل /SM/
    const base = window.location.origin + "/SM/";
    const finalLink = base + "index.html?u=" + encoded;

    document.getElementById("result").textContent = finalLink;
}
</script>

</body>
</html>
