<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirect</title>
<script>
function decodeUTF8(str){
    try{
        return decodeURIComponent(escape(atob(str)));
    }catch(e){
        return null;
    }
}

const params = new URLSearchParams(window.location.search);
const u = params.get("u");
const link = decodeUTF8(u);

if(link){
    setTimeout(()=>{
        window.location.href = link;
    },1500);
}else{
    document.body.innerHTML = "<h2 style='text-align:center'>الرابط تالف</h2>";
}
</script>
</head>
<body></body>
</html>
