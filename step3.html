style="position:absolute;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"
frameborder="0"></iframe>

<div class="center-area">
<div class="circle-timer" id="circle3">
<div id="countdown3">60</div>
</div>
<button id="btn3" class="download-btn">Download Now</button>
</div>

<script>

// عد تنازلي 60 ثانية
let time3=60;
const countdown3=document.getElementById("countdown3");
const circle3=document.getElementById("circle3");

const interval3=setInterval(()=>{
countdown3.textContent=time3;
const deg=((60-time3)/60)*360;
circle3.style.background=`conic-gradient(red ${deg}deg,#ddd ${deg}deg 360deg)`;
time3--;
if(time3<0){
clearInterval(interval3);
circle3.style.display="none";
document.getElementById("btn3").style.display="block";
}
},1000);

// منطق الضغطات
let clicks3=0;
const smartLink="https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c";

// استخراج الرابط المشفر من الـ URL
const params=new URLSearchParams(window.location.search);
const encodedLink=params.get("u");

document.getElementById("btn3").onclick=function(){

clicks3++;

if(clicks3<=5){
window.open(smartLink,"_blank");
}else{
if(encodedLink){
const decodedLink=atob(encodedLink);
window.location.href=decodedLink;
}
}

};

</script>
