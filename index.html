<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SM - Subscription Maker (مزعج جداً)</title>

        <!-- خط احترافي -->
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Cairo', sans-serif;
            }

            body {
                background: #ffffff;
                color: #111;
            }

            .header {
                background: linear-gradient(90deg, #ff0000, #b30000);
                color: white;
                padding: 18px;
                text-align: center;
                font-size: 24px;
                font-weight: 900;
                letter-spacing: 1px;
                position: relative;
                z-index: 10;
            }

            .card {
                width: 95%;
                max-width: 560px;
                margin: 20px auto;
                background: #ffffff;
                border: 2px solid #ff0000;
                border-radius: 14px;
                padding: 22px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
                position: relative;
                z-index: 5;
            }

            .title {
                color: #b30000;
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 10px;
            }

            input {
                width: 100%;
                padding: 14px;
                margin: 8px 0;
                border-radius: 10px;
                border: 1px solid #ddd;
                font-size: 14px;
                transition: 0.2s;
            }

            input:focus {
                border: 1px solid #ff0000;
                outline: none;
                box-shadow: 0 0 8px rgba(255, 0, 0, 0.2);
            }

            button {
                width: 100%;
                padding: 14px;
                margin-top: 8px;
                border: none;
                border-radius: 10px;
                background: linear-gradient(90deg, #ff0000, #cc0000);
                color: white;
                font-weight: 700;
                cursor: pointer;
                font-size: 15px;
                transition: 0.2s;
            }

            button:hover {
                background: linear-gradient(90deg, #ff1a1a, #990000);
                transform: scale(1.01);
            }

            .sub-box {
                border: 1px dashed #ff0000;
                padding: 12px;
                margin: 10px 0;
                border-radius: 10px;
                background: #fffafa;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .sub-box input {
                flex: 1;
                margin: 0;
            }

            .delete-btn {
                background: #aaaaaa;
                color: white;
                border: none;
                border-radius: 8px;
                width: 40px;
                height: 40px;
                font-size: 18px;
                font-weight: bold;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: 0.2s;
                margin-top: 0;
                padding: 0;
            }

            .delete-btn:hover {
                background: #ff0000;
                transform: scale(1.05);
            }

            .counter {
                font-size: 18px;
                color: #ff0000;
                font-weight: 900;
                margin: 12px 0;
                text-align: center;
            }

            .ads-mini {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 6px;
                margin-top: 15px;
            }

            .ad-btn {
                font-size: 10px;
                padding: 7px 4px;
                border: 1px solid #eee;
                border-radius: 6px;
                background: #ffffff;
                cursor: pointer;
                text-align: center;
                color: #888;
                transition: 0.2s;
            }

            .ad-btn:hover {
                background: #ffecec;
                border-color: #ff0000;
                color: #ff0000;
            }

            #result input {
                text-align: center;
                color: #b30000;
                font-weight: bold;
            }
        </style>
    </head>

    <body>

        <div class="header">
            SM - Subscription Maker (مزعج رسمي)
        </div>

        <!-- صانع الروابط -->
        <div id="creator" class="card">
            <div class="title">الرابط الأساسي</div>
            <input id="mainLink" placeholder="ضع الرابط الأساسي">

            <div class="title">عدد الضغطات المطلوبة لكل اشتراك</div>
            <input id="clicksRequired" type="number" value="2">

            <div class="title">روابط الاشتراك (غير محدود)</div>
            <div id="subsContainer"></div>

            <button onclick="addSub()">+ إضافة اشتراك جديد</button>
            <button onclick="createLink()">🚀 إنشاء الرابط المختصر</button>

            <div id="result" style="margin-top: 12px;"></div>
        </div>

        <!-- صفحة الاشتراكات -->
        <div id="gate" class="card" style="display: none;">
            <div class="title">⚠️ يجب إكمال جميع الاشتراكات للمتابعة</div>

            <!-- إعلان علوي مزعج (popup) -->
            <script src="https://pl28700469.effectivegatecpm.com/89/a6/b8/89a6b8558224cd67c0822829d68a87ad.js"></script>

            <div id="subsGate"></div>

            <div class="counter" id="progressText"></div>

            <!-- شبكة أزرار إعلانات صغيرة مزعجة جداً (كل واحدة تفتح إعلانين) -->
            <div class="ads-mini">
                <div class="ad-btn" onclick="popMultipleAds()">💰 Ads</div>
                <div class="ad-btn" onclick="popMultipleAds()">📢 Open</div>
                <div class="ad-btn" onclick="popMultipleAds()">🖱️ Click</div>
                <div class="ad-btn" onclick="popMultipleAds()">👁️ View</div>
                <div class="ad-btn" onclick="popMultipleAds()">▶️ Start</div>
                <div class="ad-btn" onclick="popMultipleAds()">🎁 Offer</div>
                <div class="ad-btn" onclick="popMultipleAds()">✨ Bonus</div>
                <div class="ad-btn" onclick="popMultipleAds()">💸 Free</div>
                <div class="ad-btn" onclick="popMultipleAds()">📥 Download</div>
                <div class="ad-btn" onclick="popMultipleAds()">🏆 Win</div>
            </div>
        </div>

        <script>
            let subs = [];
            let clicksRequired = 2;
            let targetLink = "";
            let clickMap = {};

            // دالة لإضافة حقل اشتراك جديد
            function addSub() {
                const container = document.getElementById("subsContainer");
                const box = document.createElement("div");
                box.className = "sub-box";

                // إنشاء حقل الإدخال
                const input = document.createElement("input");
                input.placeholder = "رابط الاشتراك";
                input.setAttribute("data-id", Date.now() + Math.random()); // معرف فريد

                // زر الحذف
                const deleteBtn = document.createElement("button");
                deleteBtn.textContent = "✖";
                deleteBtn.className = "delete-btn";
                deleteBtn.onclick = function() {
                    container.removeChild(box);
                };

                box.appendChild(input);
                box.appendChild(deleteBtn);
                container.appendChild(box);
            }

            // دالة إنشاء الرابط المشفر
            function createLink() {
                const main = document.getElementById("mainLink").value.trim();
                clicksRequired = parseInt(document.getElementById("clicksRequired").value) || 2;

                if (!main) {
                    alert("ضع الرابط الأساسي");
                    return;
                }

                // جمع جميع روابط الاشتراك
                const inputs = document.querySelectorAll("#subsContainer input");
                subs = [];

                inputs.forEach(function(input) {
                    const val = input.value.trim();
                    if (val !== "") {
                        subs.push(val);
                    }
                });

                if (subs.length === 0) {
                    alert("أضف اشتراك واحد على الأقل");
                    return;
                }

                // تشفير البيانات
                const data = btoa(JSON.stringify({
                    main: main,
                    subs: subs,
                    clicks: clicksRequired
                }));

                const shortLink = location.origin + location.pathname + "#data=" + data;

                document.getElementById("result").innerHTML =
                    "<input value='" + shortLink + "' readonly>";
            }

            // عرض أزرار الاشتراكات في صفحة البوابة
            function renderSubs() {
                const container = document.getElementById("subsGate");
                container.innerHTML = "";

                subs.forEach(function(link, index) {
                    clickMap[index] = 0;

                    const btn = document.createElement("button");
                    btn.textContent = "اشتراك رقم " + (index + 1) + " (0/" + clicksRequired + ")";

                    btn.onclick = function() {
                        handleClick(index, link, btn);
                    };

                    container.appendChild(btn);
                });

                updateProgress();
            }

            // معالجة النقر على زر الاشتراك
            function handleClick(i, link, btn) {
                // فتح إعلانين مزعجين
                popMultipleAds();

                // فتح رابط الاشتراك
                window.open(link, "_blank");

                // تحديث العداد
                clickMap[i]++;

                btn.textContent =
                    "اشتراك رقم " + (i + 1) + " (" + clickMap[i] + "/" + clicksRequired + ")";

                updateProgress();
            }

            // تحديث نص التقدم والتحقق من اكتمال جميع الضغطات
            function updateProgress() {
                let done = true;

                for (let key in clickMap) {
                    if (clickMap[key] < clicksRequired) {
                        done = false;
                        break;
                    }
                }

                document.getElementById("progressText").textContent =
                    "يجب الضغط على كل اشتراك " + clicksRequired + " مرات للمتابعة";

                if (done === true) {
                    // إعلان أخير قبل التحويل
                    popMultipleAds();
                    setTimeout(function() {
                        window.location.href = targetLink;
                    }, 1500);
                }
            }

            // دالة فتح إعلانين مزعجين في وقت واحد
            function popMultipleAds() {
                // فتح أول إعلان
                window.open(
                    "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c",
                    "_blank"
                );
                // فتح إعلان ثاني (مختلف)
                window.open(
                    "https://www.effectivegatecpm.com/ad/c0/62/adc06235d53a0b6f378838879d3f116a",
                    "_blank"
                );
            }

            // عند تحميل الصفحة: إعلان مزعج فوري
            window.onload = function() {
                // فتح إعلان عند فتح الصفحة
                setTimeout(() => {
                    popMultipleAds();
                }, 500);

                // التحقق من وجود رابط مشفر
                if (location.hash.includes("data=")) {
                    document.getElementById("creator").style.display = "none";
                    document.getElementById("gate").style.display = "block";

                    try {
                        const encoded = location.hash.split("data=")[1];
                        const decoded = JSON.parse(atob(encoded));

                        subs = decoded.subs;
                        clicksRequired = decoded.clicks;
                        targetLink = decoded.main;

                        renderSubs();
                    } catch (e) {
                        alert("الرابط غير صالح");
                        document.getElementById("creator").style.display = "block";
                        document.getElementById("gate").style.display = "none";
                    }
                }
            };
        </script>

        <!-- سكربتات إعلانات إضافية (مزعجة جداً) -->
        <script src="https://pl28700485.effectivegatecpm.com/ad/c0/62/adc06235d53a0b6f378838879d3f116a.js"></script>
    </body>
</html>
