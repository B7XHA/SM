<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Link</title>

<script>
const params = new URLSearchParams(window.location.search);
const u = params.get("u");

if(!u){
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px'>الرابط غير صالح</h2>";
}else{
    // ينقل لصفحة أولى بدل التحويل المباشر
    window.location.href = "step1.html?u=" + u;
}
</script>
</head>
<body></body>
</html>
