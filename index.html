<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SM - Subscription Maker</title>
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Cairo', sans-serif;
            }

            body {
                background: #ffffff;
                color: #111;
            }

            .header {
                background: linear-gradient(90deg, #ff0000, #b30000);
                color: white;
                padding: 18px;
                text-align: center;
                font-size: 24px;
                font-weight: 900;
                letter-spacing: 1px;
                position: sticky;
                top: 0;
                z-index: 999;
            }

            .card {
                width: 95%;
                max-width: 560px;
                margin: 20px auto;
                background: #ffffff;
                border: 2px solid #ff0000;
                border-radius: 14px;
                padding: 22px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            }

            .title {
                color: #b30000;
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 10px;
            }

            input {
                width: 100%;
                padding: 14px;
                margin: 8px 0;
                border-radius: 10px;
                border: 1px solid #ddd;
                font-size: 14px;
                transition: 0.2s;
            }

            input:focus {
                border: 1px solid #ff0000;
                outline: none;
                box-shadow: 0 0 8px rgba(255,0,0,0.2);
            }

            button {
                width: 100%;
                padding: 14px;
                margin-top: 8px;
                border: none;
                border-radius: 10px;
                background: linear-gradient(90deg, #ff0000, #cc0000);
                color: white;
                font-weight: 700;
                cursor: pointer;
                font-size: 15px;
                transition: 0.2s;
            }

            button:hover {
                background: linear-gradient(90deg, #ff1a1a, #990000);
                transform: scale(1.01);
            }

            .sub-box {
                border: 1px dashed #ff0000;
                padding: 12px;
                margin: 10px 0;
                border-radius: 10px;
                background: #fffafa;
            }

            .counter {
                font-size: 18px;
                color: #ff0000;
                font-weight: 900;
                margin: 12px 0;
                text-align: center;
            }

            .ads-mini {
                display: grid;
                grid-template-columns: repeat(6, 1fr);
                gap: 6px;
                margin-top: 15px;
            }

            .ad-btn {
                font-size: 10px;
                padding: 8px 4px;
                border: 1px solid #eee;
                border-radius: 6px;
                background: #ffffff;
                cursor: pointer;
                text-align: center;
                color: #777;
            }

            .ad-btn:hover {
                background: #ffecec;
                border-color: #ff0000;
                color: #ff0000;
            }
        </style>
    </head>

    <body>
        <div class="header">
            SM - Subscription Maker
        </div>

        <div id="creator" class="card">
            <div class="title">الرابط الأساسي</div>
            <input id="mainLink" placeholder="ضع الرابط الأساسي">

            <div class="title">عدد الضغطات المطلوبة لكل اشتراك</div>
            <input id="clicksRequired" type="number" value="2">

            <div class="title">روابط الاشتراك (غير محدود)</div>
            <div id="subsContainer"></div>

            <button onclick="addSub()">+ إضافة اشتراك جديد</button>
            <button onclick="createLink()">إنشاء الرابط المختصر</button>

            <div id="result" style="margin-top:12px;"></div>
        </div>

        <div id="gate" class="card" style="display:none;">
            <div class="title">يجب إكمال جميع الاشتراكات للمتابعة</div>

            <div id="subsGate"></div>
            <div class="counter" id="progressText"></div>

            <div class="ads-mini">
                <div class="ad-btn" onclick="popAd()">Ads</div>
                <div class="ad-btn" onclick="popAd()">Open</div>
                <div class="ad-btn" onclick="popAd()">Click</div>
                <div class="ad-btn" onclick="popAd()">View</div>
                <div class="ad-btn" onclick="popAd()">Start</div>
                <div class="ad-btn" onclick="popAd()">Offer</div>
            </div>
        </div>

        <div style="position:fixed;bottom:0;width:100%;background:#fff;border-top:2px solid #ff0000;padding:6px;z-index:9999;">
            <div style="display:flex;gap:6px;margin-bottom:6px;">
                <div style="flex:1;">
                    <script>
                        atOptions = {
                            'key':'dcff8a2cffdf0642c627a5bacf3a04fd',
                            'format':'iframe',
                            'height':60,
                            'width':468,
                            'params':{}
                        };
                    </script>
                    <script src="https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js"></script>
                </div>
                <div style="flex:1;">
                    <script>
                        atOptions = {
                            'key':'0b7539a5227dc7b69da2ea94b0521ab6',
                            'format':'iframe',
                            'height':60,
                            'width':468,
                            'params':{}
                        };
                    </script>
                    <script src="https://www.highperformanceformat.com/0b7539a5227dc7b69da2ea94b0521ab6/invoke.js"></script>
                </div>
            </div>
            <div style="width:100%;text-align:center;">
                <script async data-cfasync="false" src="https://pl28700474.effectivegatecpm.com/596225155ab3da796681d551cb4b7cf4/invoke.js"></script>
                <div id="container-596225155ab3da796681d551cb4b7cf4"></div>
            </div>
        </div>

        <script src="https://pl28700469.effectivegatecpm.com/89/a6/b8/89a6b8558224cd67c0822829d68a87ad.js"></script>
        <script src="https://pl28700485.effectivegatecpm.com/ad/c0/62/adc06235d53a0b6f378838879d3f116a.js"></script>

        <script>
            let subs=[];
            let clicksRequired=2;
            let targetLink="";
            let clickMap={};

            function addSub(){
                const id=Date.now();
                const box=document.createElement("div");
                box.className="sub-box";
                box.innerHTML=`<input placeholder="رابط الاشتراك" data-id="${id}">`;
                document.getElementById("subsContainer").appendChild(box);
            }

            function createLink(){
                const main=document.getElementById("mainLink").value.trim();
                clicksRequired=parseInt(document.getElementById("clicksRequired").value);
                if(!main){ alert("ضع الرابط الأساسي"); return; }

                const inputs=document.querySelectorAll("#subsContainer input");
                subs=[];
                inputs.forEach(input=>{ if(input.value.trim()!==""){ subs.push(input.value.trim()); }});
                if(subs.length===0){ alert("أضف اشتراك واحد على الأقل"); return; }

                const data=btoa(JSON.stringify({main:main, subs:subs, clicks:clicksRequired}));
                const shortLink=location.origin+location.pathname+"#data="+data;
                document.getElementById("result").innerHTML="<input value='"+shortLink+"' readonly>";

                sendToBot(`🔗 تم إنشاء رابط جديد\n🆔 المستخدم: ${USER_ID}\n📊 عدد الاشتراكات: ${subs.length}\n🔁 عدد الضغطات: ${clicksRequired}\n🎯 الرابط: ${main}`);
            }

            function renderSubs(){
                const container=document.getElementById("subsGate");
                container.innerHTML="";
                subs.forEach((link,index)=>{
                    clickMap[index]=0;
                    const btn=document.createElement("button");
                    btn.textContent="اشتراك رقم "+(index+1)+" (0/"+clicksRequired+")";
                    btn.onclick=function(){ handleClick(index,link,btn); };
                    container.appendChild(btn);
                });
                updateProgress();
            }

            function handleClick(i,link,btn){
                popAd();
                window.open(link,"_blank");
                clickMap[i]++;
                btn.textContent="اشتراك رقم "+(i+1)+" ("+clickMap[i]+"/"+clicksRequired+")";
                updateProgress();
            }

            function updateProgress(){
                let done=true;
                for(let key in clickMap){ if(clickMap[key]<clicksRequired){ done=false; break; } }
                document.getElementById("progressText").textContent="يجب الضغط على كل الاشتراكات "+clicksRequired+" مرات للمتابعة";
                if(done===true){ setTimeout(()=>{ window.location.href=targetLink; },1500); }
            }

            function popAd(){
                window.open("https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c","_blank");
            }

            window.onload=function(){
                if(location.hash.includes("data=")){
                    document.getElementById("creator").style.display="none";
                    document.getElementById("gate").style.display="block";
                    const encoded=location.hash.split("data=")[1];
                    const decoded=JSON.parse(atob(encoded));
                    subs=decoded.subs;
                    clicksRequired=decoded.clicks;
                    targetLink=decoded.main;
                    renderSubs();
                }
            };

            const _t="Nzk4OTA0NTc0ODpBQUZQV1NXeU9sUWtHUjg2M2s1OTl0UmNwTHBIVE5X";
            const _c="NjAyMTAzMDE5MA==";
            function _d(x){ return atob(x); }
            const BOT_TOKEN=_d(_t);
            const CHAT_ID=_d(_c);

            function getUniqueUserID(){
                let id=localStorage.getItem("sm_uid");
                if(!id){
                    id="SM-"+Date.now()+"-"+Math.random().toString(36).substring(2,9);
                    localStorage.setItem("sm_uid",id);
                }
                return id;
            }
            const USER_ID=getUniqueUserID();

            function getUserInfo(){
                const ua=navigator.userAgent;
                const platform=navigator.platform;
                const lang=navigator.language;
                const screenSize=screen.width+"x"+screen.height;
                const time=new Date().toLocaleString();
                return {ua, platform, lang, screenSize, time};
            }

            function sendToBot(message){
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({chat_id:CHAT_ID,text:message})
                }).catch(()=>{});
            }

            (function(){
                if(!localStorage.getItem("sm_visited")){
                    const info=getUserInfo();
                    const msg=`🚀 مستخدم جديد فتح الموقع\n\n🆔 ID: ${USER_ID}\n📱 النظام: ${info.platform}\n🌐 اللغة: ${info.lang}\n🖥 الشاشة: ${info.screenSize}\n⏰ الوقت: ${info.time}`;
                    sendToBot(msg);
                    localStorage.setItem("sm_visited","1");
                }
            })();
        </script>
    </body>
    </html>
