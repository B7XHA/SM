<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM - Subscription Maker</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{
    background:#ffffff;
    color:#111;
}

.header{
    background:linear-gradient(90deg,#ff0000,#b30000);
    color:white;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:900;
}

.card{
    width:95%;
    max-width:550px;
    margin:20px auto;
    background:#fff;
    border:2px solid #ff0000;
    border-radius:14px;
    padding:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

.title{
    color:#b30000;
    font-size:20px;
    font-weight:700;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:#ff0000;
    color:white;
    font-weight:700;
    cursor:pointer;
}

button:hover{background:#cc0000;}

.sub-box{
    border:1px dashed #ff0000;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.counter{
    font-size:18px;
    color:#ff0000;
    font-weight:900;
    margin:10px 0;
}

.ads-mini{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    margin-top:10px;
}

.ad-btn{
    font-size:10px;
    padding:6px;
    border:1px solid #eee;
    border-radius:6px;
    background:#fff;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="header">SM - Subscription Maker</div>

<!-- صانع الروابط -->
<div id="creator" class="card">
    <div class="title">الرابط الأساسي</div>
    <input id="mainLink" placeholder="ضع الرابط الأساسي">

    <div class="title">عدد الضغطات المطلوبة لكل اشتراك</div>
    <input id="clicksRequired" type="number" value="2">

    <div class="title">روابط الاشتراك</div>
    <div id="subsContainer"></div>

    <button onclick="addSub()">+ إضافة اشتراك جديد</button>
    <button onclick="createLink()">إنشاء الرابط المختصر</button>

    <div id="result" style="margin-top:10px;"></div>
</div>

<!-- صفحة الاشتراكات -->
<div id="gate" class="card" style="display:none;">
    <div class="title">يجب إكمال الاشتراكات للمتابعة</div>
    <div id="subsGate"></div>

    <div class="counter" id="progressText"></div>

    <!-- إعلانات مزعجة -->
    <div class="ads-mini">
        <div class="ad-btn" onclick="popAd()">Ads</div>
        <div class="ad-btn" onclick="popAd()">Open</div>
        <div class="ad-btn" onclick="popAd()">Click</div>
        <div class="ad-btn" onclick="popAd()">View</div>
        <div class="ad-btn" onclick="popAd()">Start</div>
        <div class="ad-btn" onclick="popAd()">Win</div>
        <div class="ad-btn" onclick="popAd()">Offer</div>
        <div class="ad-btn" onclick="popAd()">Bonus</div>
        <div class="ad-btn" onclick="popAd()">Free</div>
        <div class="ad-btn" onclick="popAd()">Download</div>
    </div>
</div>

<script>
let subs = [];
let clicksRequired = 2;
let targetLink = "";
let clickMap = {};

// إضافة اشتراك لا نهائي
function addSub(){
    const id = Date.now();
    const box = document.createElement("div");
    box.className = "sub-box";
    box.innerHTML = `<input placeholder="رابط الاشتراك" data-id="${id}">`;
    document.getElementById("subsContainer").appendChild(box);
}

// إنشاء الرابط
function createLink(){
    const main = document.getElementById("mainLink").value;
    clicksRequired = parseInt(document.getElementById("clicksRequired").value);

    if(!main){ alert("ضع الرابط الأساسي"); return; }

    const inputs = document.querySelectorAll("#subsContainer input");
    subs = [];
    inputs.forEach(i=>{
        if(i.value) subs.push(i.value);
    });

    if(subs.length === 0){
        alert("أضف اشتراك واحد على الأقل");
        return;
    }

    const data = btoa(JSON.stringify({
        main: main,
        subs: subs,
        clicks: clicksRequired
    }));

    const link = location.origin + location.pathname + "#data=" + data;
    document.getElementById("result").innerHTML =
        "<input value='"+link+"' readonly>";
}

// عرض الاشتراكات
function renderSubs(){
    const container = document.getElementById("subsGate");
    container.innerHTML = "";
    subs.forEach((link, index)=>{
        clickMap[index] = 0;
        const btn = document.createElement("button");
        btn.textContent = "اشتراك رقم " + (index+1) + " (0/"+clicksRequired+")";
        btn.onclick = ()=>handleClick(index, link, btn);
        container.appendChild(btn);
    });
    updateProgress();
}

// عند الضغط على اشتراك
function handleClick(i, link, btn){
    popAd(); // إعلان مزعج كل ضغطة
    window.open(link, "_blank");
    clickMap[i]++;
    btn.textContent = `اشتراك رقم ${i+1} (${clickMap[i]}/${clicksRequired})`;
    updateProgress();
}

// التحقق من الإكمال
function updateProgress(){
    let done = true;
    for(let i in clickMap){
        if(clickMap[i] < clicksRequired){
            done = false;
            break;
        }
    }

    document.getElementById("progressText").textContent =
        "يجب الضغط على كل الاشتراكات " + clicksRequired + " مرات";

    if(done){
        setTimeout(()=>{
            window.location.href = targetLink;
        },1500);
    }
}

// إعلانات منبثقة مزعجة
function popAd(){
    window.open("https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c","_blank");
}

// عند فتح رابط مختصر
window.onload = function(){
    if(location.hash.includes("data=")){
        document.getElementById("creator").style.display="none";
        document.getElementById("gate").style.display="block";

        const decoded = JSON.parse(atob(location.hash.split("data=")[1]));
        subs = decoded.subs;
        clicksRequired = decoded.clicks;
        targetLink = decoded.main;

        renderSubs();
    }
}
</script>

<!-- سكربتات الإعلانات المزعجة -->
<script src="https://pl28700469.effectivegatecpm.com/89/a6/b8/89a6b8558224cd67c0822829d68a87ad.js"></script>
<script src="https://pl28700485.effectivegatecpm.com/ad/c0/62/adc06235d53a0b6f378838879d3f116a.js"></script>

</body>
</html>
