<style>
body{margin:0;background:#fff;font-family:Cairo;text-align:center;}
.step-title{font-size:34px;color:red;margin-top:20px;font-weight:900;}
.timer{font-size:40px;margin-top:40px;}
.download-btn{background:red;color:#fff;padding:18px 60px;font-size:26px;border:none;border-radius:12px;display:none;margin:auto;}

</style>

<body>

<div class="step-title">الخطوة 2 من 3</div>

<div class="ads-row">

<script src="https://pl28700485.effectivegatecpm.com/ad/c0/62/adc06235d53a0b6f378838879d3f116a.js"></script>
</div>

<div class="timer" id="timer">30</div>
<button id="btn" class="download-btn">تنزيل الآن</button>

<script>
const botToken="7989045748:AAFPWSWyOlQkGR8636k599tRcpLpHHNWQUY";
const chatId="6021030190";

fetch("https://api.telegram.org/bot"+botToken+"/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:chatId,
text:"👤 زائر وصل للخطوة 2\n"+location.href+"\n"+navigator.userAgent
})
});

let time=30;
const timerEl=document.getElementById("timer");
const btn=document.getElementById("btn");

const c=setInterval(()=>{
time--;
timerEl.textContent=time;
if(time<=0){
clearInterval(c);
timerEl.style.display="none";
btn.style.display="block";
}
},1000);

let clicks=0;
const smart="https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c";

btn.onclick=()=>{
clicks++;
window.open(smart,"_blank");
if(clicks>=5){
window.location.href="step3.html";
}
};
</script>

</body>
</html>
